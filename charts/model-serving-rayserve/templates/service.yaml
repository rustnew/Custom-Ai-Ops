apiVersion: v1
kind: Service
metadata:
  name: {{ include "bjw-template.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "bjw-template.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
    {{- if .Values.rayDashboard.enabled }}
    - name: dashboard
      port: {{ .Values.rayDashboard.port }}
      targetPort: dashboard
      protocol: TCP
    {{- end }}
  selector:
    {{- include "bjw-template.selectorLabels" . | nindent 4 }}