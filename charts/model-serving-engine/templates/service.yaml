apiVersion: v1
kind: Service
metadata:
  name: {{ include "model-serving-engine.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
  annotations:
    {{- include "model-serving-engine.annotations" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "model-serving-engine.selectorLabels" . | nindent 4 }}