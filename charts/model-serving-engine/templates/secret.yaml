{{- if .Values.secrets }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "model-serving-engine.fullname" . }}-secret
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "model-serving-engine.labels" . | nindent 4 }}
type: Opaque
data:
  {{- range $key, $value := .Values.secrets }}
  {{ $key }}: {{ $value | b64enc }}
  {{- end }}
{{- end }}