global:
  imageRegistry: ""
  imagePullSecrets: []
  storageClass: ""
  namespace: model-serving

engine:
  type: vllm

  vllm:
    image:
      repository: vllm/vllm-openai
      tag: v0.6.3
      pullPolicy: IfNotPresent
    command: []
    args:
      - --model
      - /models/$(MODEL_NAME)
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "4096"
      - --gpu-memory-utilization
      - "0.90"
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 32Gi
      requests:
        cpu: "4"
        memory: 16Gi
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 120
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    startupProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 30
      periodSeconds: 10
      failureThreshold: 60

  llamacpp:
    image:
      repository: ghcr.io/ggerganov/llama.cpp
      tag: server-b4093
      pullPolicy: IfNotPresent
    command: []
    args:
      - -m
      - /models/$(MODEL_NAME)
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - -c
      - "4096"
      - -ngl
      - "99"
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 16Gi
      requests:
        cpu: "4"
        memory: 8Gi
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 90
      periodSeconds: 30
      timeoutSeconds: 10
      failureThreshold: 5
    startupProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 15
      periodSeconds: 10
      failureThreshold: 60

  onnxGenai:
    image:
      repository: ghcr.io/microsoft/onnxruntime-genai
      tag: latest
      pullPolicy: IfNotPresent
    command: []
    args:
      - --model_path
      - /models/$(MODEL_NAME)
      - --port
      - "8080"
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 16Gi
      requests:
        cpu: "4"
        memory: 8Gi
    livenessProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 60
      periodSeconds: 15
      timeoutSeconds: 5
      failureThreshold: 6
    startupProbe:
      httpGet:
        path: /health
        port: http
      initialDelaySeconds: 10
      periodSeconds: 5
      failureThreshold: 90

model:
  name: ""
  volumeSize: 50Gi
  seedCommand: []
  seedImage: ""
  seedImagePullPolicy: IfNotPresent

replicaCount: 1

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 50Gi

persistenceRWX:
  enabled: true
  storageClass: longhorn-rwx
  accessMode: ReadWriteMany
  size: 50Gi

imagePullSecrets: []
serviceAccount:
  create: true
  annotations: {}
  name: ""

podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop:
      - ALL

service:
  type: ClusterIP
  port: 80
  targetPort: 8000

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts: []
  tls: []

resources: {}

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80
  targetMemoryUtilizationPercentage: 80

podDisruptionBudget:
  enabled: true
  minAvailable: 1

networkPolicy:
  enabled: true
  ingressFrom: []

nodeSelector: {}

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

affinity: {}

topologySpreadConstraints: []

extraEnv: []
extraVolumes: []
extraVolumeMounts: []

commonLabels: {}
commonAnnotations: {}

restartPolicy: Always

terminationGracePeriodSeconds: 300