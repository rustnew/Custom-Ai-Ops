engine:
  type: llamacpp
  llamacpp:
    image:
      repository: ghcr.io/ggerganov/llama.cpp
      tag: server-b4093
      pullPolicy: IfNotPresent
    args:
      - -m
      - /models/$(MODEL_NAME)
      - --host
      - "0.0.0.0"
      - --port
      - "8080"
      - -c
      - "8192"
      - -ngl
      - "99"
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 16Gi
      requests:
        cpu: "4"
        memory: 8Gi