engine:
  type: vllm
  vllm:
    image:
      repository: vllm/vllm-openai
      tag: v0.6.3
      pullPolicy: IfNotPresent
    args:
      - --model
      - /models/$(MODEL_NAME)
      - --tensor-parallel-size
      - "1"
      - --max-model-len
      - "8192"
      - --gpu-memory-utilization
      - "0.90"
    resources:
      limits:
        nvidia.com/gpu: 1
        memory: 32Gi
      requests:
        cpu: "4"
        memory: 16Gi