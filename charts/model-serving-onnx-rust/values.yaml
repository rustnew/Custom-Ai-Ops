global:
  namespace: model-serving

engine:
  type: onnxGenai

image:
  repository: ghcr.io/microsoft/onnxruntime-genai
  tag: latest
  pullPolicy: IfNotPresent

command: []
args:
  - --model_path
  - /models/$(MODEL_NAME)
  - --port
  - "8080"

model:
  name: ""
  volumeSize: 50Gi
  seedImage: ""
  seedImagePullPolicy: IfNotPresent
  seedCommand: []

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  limits:
    nvidia.com/gpu: 1
    memory: 16Gi
  requests:
    cpu: "4"
    memory: 8Gi

livenessProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6

startupProbe:
  httpGet:
    path: /health
    port: 8080
  initialDelaySeconds: 10
  periodSeconds: 5
  failureThreshold: 90

replicaCount: 1

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 50Gi

persistenceRWX:
  enabled: true
  storageClass: longhorn-rwx
  accessMode: ReadWriteMany
  size: 50Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

affinity: {}

topologySpreadConstraints: []