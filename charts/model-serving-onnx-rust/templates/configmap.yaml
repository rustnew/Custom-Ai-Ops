apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "bjw-template.fullname" . }}-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "bjw-template.labels" . | nindent 4 }}
data:
  ENGINE_TYPE: "onnxGenai"
  MODEL_NAME: {{ .Values.model.name | quote }}
  ONNX_GENAI_PORT: {{ .Values.service.targetPort | quote }}