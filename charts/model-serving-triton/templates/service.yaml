apiVersion: v1
kind: Service
metadata:
  name: {{ include "bjw-template.fullname" . }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "bjw-template.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - name: http
      port: {{ .Values.service.ports.http }}
      targetPort: http
      protocol: TCP
    - name: grpc
      port: {{ .Values.service.ports.grpc }}
      targetPort: grpc
      protocol: TCP
    - name: metrics
      port: {{ .Values.service.ports.metrics }}
      targetPort: metrics
      protocol: TCP
  selector:
    {{- include "bjw-template.selectorLabels" . | nindent 4 }}