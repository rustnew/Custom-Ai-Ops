global:
  namespace: model-serving

engine:
  type: triton

image:
  repository: nvcr.io/nvidia/tritonserver
  tag: "24.08-py3"
  pullPolicy: IfNotPresent

command: []
args:
  - tritonserver
  - --model-repository=/models
  - --http-port=8000
  - --grpc-port=8001
  - --metrics-port=8002

model:
  name: ""
  volumeSize: 100Gi
  seedImage: ""
  seedImagePullPolicy: IfNotPresent
  seedCommand: []

service:
  type: ClusterIP
  ports:
    http: 8000
    grpc: 8001
    metrics: 8002

resources:
  limits:
    nvidia.com/gpu: 1
    memory: 32Gi
  requests:
    cpu: "4"
    memory: 16Gi

livenessProbe:
  httpGet:
    path: /v2/health/live
    port: 8000
  initialDelaySeconds: 120
  periodSeconds: 30
  timeoutSeconds: 10
  failureThreshold: 5

startupProbe:
  httpGet:
    path: /v2/health/live
    port: 8000
  initialDelaySeconds: 30
  periodSeconds: 10
  failureThreshold: 60

readinessProbe:
  httpGet:
    path: /v2/health/ready
    port: 8000
  initialDelaySeconds: 60
  periodSeconds: 15
  timeoutSeconds: 5
  failureThreshold: 6

replicaCount: 1

persistence:
  enabled: true
  storageClass: longhorn
  accessMode: ReadWriteOnce
  size: 100Gi

persistenceRWX:
  enabled: true
  storageClass: longhorn-rwx
  accessMode: ReadWriteMany
  size: 100Gi

podDisruptionBudget:
  enabled: true
  minAvailable: 1

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 4
  targetCPUUtilizationPercentage: 80

nodeSelector: {}

tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

affinity: {}

topologySpreadConstraints: []