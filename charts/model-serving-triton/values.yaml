# Triton Inference Server Engine Specific Values
# Multi-format support (ONNX, TensorRT-LLM, etc.)

apiVersion: v2
name: model-serving-triton
description: Triton Inference Server for multi-format model serving
type: application
version: 1.0.0
appVersion: "latest"

# Image configuration
image:
  repository: onnx-ai-helm/triton
  tag: latest
  pullPolicy: IfNotPresent

# Model configuration
model:
  name: triton-model
  huggingfaceRepo: onnx-ai-helm/triton-example
  filename: model.onnx
  storageSize: 50Gi

# Replicas
replicas: 2

# Node selector for GPU scheduling
nodeSelector:
  nvidia.com/gpu: "true"

# Tolerations for GPU nodes
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - model-serving-triton
          topologyKey: kubernetes.io/hostname

# API Key for authentication
apiKey: change-me

# Database configuration
db:
  username: postgres
  password: change-me

# Container configuration
container:
  port: 8080
  grpcPort: 50051

# Probe configurations
probes:
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120
  readiness:
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  startup:
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120

# Resource requirements
resources:
  requests:
    cpu: 4000m
    memory: 32Gi
    nvidiaCompu: 2
  limits:
    cpu: 8000m
    memory: 64Gi
    nvidiaCompu: 2

# Storage configuration
storageClassName: longhorn

# Ingress configuration
ingressClassName: nginx

# Triton specific container arguments
containerArgs:
  - --triton-server
  - --max-batch-size 16
  - --allow-grpc

# Triton specific sidecars
sidecars:
  - name: caddy-auth
    image: caddy:latest
    args:
      - --api-key
      - /etc/caddy/api_key

# Triton specific probe configuration
probes:
  liveness:
    tcpSocket:
      port: 8080
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120
  startup:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120
  readiness:
    httpGet:
      path: /health
      port: 8080
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
