# Common Base Template for ML Model Serving
# Provides shared dependencies, base configurations, and common patterns

apiVersion: v1
kind: Namespace
metadata:
  name: {{ .Release.Name }}
  labels:
    app.kubernetes.io/name: ml-serving
    app.kubernetes.io/part-of: onnx-ai-helm

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ .Release.Name }}-config
  namespace: {{ .Release.Namespace }}
data:
  # Model configuration
  model-config.json: |
    {{ .Files.Get "model-config.json" | nindent 4 }}
  
  # Environment variables
  env-vars.yaml: |
    {{ .Files.Get "env-vars.yaml" | nindent 4 }}

---
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
  namespace: {{ .Release.Namespace }}
type: Opaque
stringData:
  # API Key for authentication
  api-key: {{ .Values.apiKey | default "change-me" }}
  # Database credentials
  db-username: {{ .Values.db.username | default "postgres" }}
  db-password: {{ .Values.db.password | default "change-me" }}

---
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Release.Name }}-seed-model
  namespace: {{ .Release.Namespace }}
spec:
  backoffLimit: 4
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
        job: seed-model
    spec:
      restartPolicy: OnFailure
      containers:
        - name: seed-model
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - bash
            - -c
            - |
              # Download model weights to unique path
              MODEL_PATH="/models/{{ .Values.model.name }}/{{ .Values.model.commitHash }}"
              mkdir -p "$MODEL_PATH"
              curl -sL "https://huggingface.co/{{ .Values.model.huggingfaceRepo }}/resolve/main/{{ .Values.model.filename }}" \
                -o "$MODEL_PATH/model.safetensors"
              echo "Model seeded to $MODEL_PATH"
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-model-pvc

---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: {{ .Release.Name }}
  namespace: {{ .Release.Namespace }}
spec:
  serviceName: {{ .Release.Name }}
  replicas: {{ .Values.replicas | default 1 }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}
    spec:
      {{- if .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml .Values.nodeSelector | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations:
        {{- toYaml .Values.tolerations | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity:
        {{- toYaml .Values.affinity | nindent 8 }}
      {{- end }}
      initContainers:
        - name: download-model
          image: {{ .Values.image.repository }}:{{ .Values.image.tag }}
          command:
            - bash
            - -c
            - |
              # Download model weights
              MODEL_PATH="/models/{{ .Values.model.name }}"
              mkdir -p "$MODEL_PATH"
              curl -sL "https://huggingface.co/{{ .Values.model.huggingfaceRepo }}/resolve/main/{{ .Values.model.filename }}" \
                -o "$MODEL_PATH/model.safetensors"
          volumeMounts:
            - name: model-storage
              mountPath: /models
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy | default "IfNotPresent" }}
          ports:
            - name: http
              containerPort: {{ .Values.container.port | default 8080 }}
              protocol: TCP
            - name: grpc
              containerPort: {{ .Values.container.grpcPort | default 50051 }}
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ .Release.Name }}-config
          env:
            - name: MODEL_PATH
              value: /models/{{ .Values.model.name }}
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Release.Name }}-secrets
                  key: api-key
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds | default 60 }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold | default 120 }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.httpGetPath | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds | default 120 }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold | default 30 }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.httpGetPath | default "/health" }}
              port: http
            initialDelaySeconds: {{ .Values.probes.startup.initialDelaySeconds | default 120 }}
            periodSeconds: {{ .Values.probes.startup.periodSeconds | default 10 }}
            timeoutSeconds: {{ .Values.probes.startup.timeoutSeconds | default 5 }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold | default 120 }}
          resources:
            requests:
              cpu: {{ .Values.resources.requests.cpu | default "4000m" }}
              memory: {{ .Values.resources.requests.memory | default "16Gi" }}
              nvidia.com/gpu: {{ .Values.resources.requests.nvidiaCompu | default "1" }}
            limits:
              cpu: {{ .Values.resources.limits.cpu | default "8000m" }}
              memory: {{ .Values.resources.limits.memory | default "32Gi" }}
              nvidia.com/gpu: {{ .Values.resources.limits.nvidiaCompu | default "1" }}
          volumeMounts:
            - name: model-storage
              mountPath: /models
      volumes:
        - name: model-storage
          persistentVolumeClaim:
            claimName: {{ .Release.Name }}-model-pvc
  volumeClaimTemplates:
    - metadata:
        name: {{ .Release.Name }}-model-pvc
      spec:
        accessModes:
          - ReadWriteMany
        resources:
          requests:
            storage: {{ .Values.model.storageSize | default "100Gi" }}
        storageClassName: {{ .Values.storageClassName | default "longhorn" }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    kubernetes.io/ingress.class: nginx
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
spec:
  {{- if .Values.ingressClassName }}
  ingressClassName: {{ .Values.ingressClassName }}
  {{- end }}
  rules:
    - http:
        paths:
          - path: /v1
            pathType: Prefix
            backend:
              service:
                name: {{ .Release.Name }}
                port:
                  number: {{ .Values.container.port | default 8080 }}
