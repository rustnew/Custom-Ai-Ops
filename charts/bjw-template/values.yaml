# Common Base Values for ML Model Serving
# Override these values in environment-specific values files

# Chart metadata
apiVersion: v2
name: bjw-template
description: Common base template for ML model serving
type: application
version: 1.0.0
appVersion: "latest"

# Image configuration
image:
  repository: onnx-ai-helm/bjw-template
  tag: latest
  pullPolicy: IfNotPresent

# Model configuration
model:
  name: default-model
  huggingfaceRepo: onnx-ai-helm/example-model
  filename: model.safetensors
  storageSize: 100Gi

# Replicas
replicas: 1

# Node selector for GPU scheduling
nodeSelector:
  # nvidia.com/gpu: "true"

# Tolerations for GPU nodes
tolerations:
  - key: nvidia.com/gpu
    operator: Exists
    effect: NoSchedule

# Affinity rules
affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - {{ .Release.Name }}
          topologyKey: kubernetes.io/hostname

# API Key for authentication
apiKey: change-me

# Database configuration
db:
  username: postgres
  password: change-me

# Container configuration
container:
  port: 8080
  grpcPort: 50051

# Probe configurations
probes:
  liveness:
    initialDelaySeconds: 60
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120
  readiness:
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 30
  startup:
    initialDelaySeconds: 120
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 120

# Resource requirements
resources:
  requests:
    cpu: 4000m
    memory: 16Gi
    nvidiaCompu: 1
  limits:
    cpu: 8000m
    memory: 32Gi
    nvidiaCompu: 1

# Storage configuration
storageClassName: longhorn

# Ingress configuration
ingressClassName: nginx

# Model-specific overrides
# See engine-specific charts for detailed configuration
