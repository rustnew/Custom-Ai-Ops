{{- if and .Values.gateway .Values.fallback .Values.fallback.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-gateway.fullname" . }}-saas-keys
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "ai-gateway.labels" . | nindent 4 }}
  annotations:
    argocd.argoproj.io/sync-wave: "-3"
type: Opaque
data:
  {{- range .Values.fallback.saasBackends }}
  {{ .name }}-api-key: {{ .apiKeySecret | b64enc }}
  {{- end }}
{{- end }}