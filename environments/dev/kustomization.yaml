apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../apps/argocd-appset-prod.yaml
namespace: argocd
commonLabels:
  env: dev
patches:
  - target:
      kind: ApplicationSet
      name: model-serving-production
    patch: |
      - op: replace
        path: /spec/template/spec/destination/namespace
        value: model-serving-dev
      - op: replace
        path: /spec/template/spec/source/helm/parameters/0/value
        value: model-serving-dev