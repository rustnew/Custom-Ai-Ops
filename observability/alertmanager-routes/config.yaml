route:
  group_by: ["alertname", "namespace", "engine_type"]
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  receiver: "default-receiver"

  routes:
    - match:
        severity: critical
      receiver: "critical-receiver"
      repeat_interval: 1h
      group_wait: 10s

    - match:
        severity: warning
      receiver: "warning-receiver"
      repeat_interval: 2h

    - match:
        component: gpu
      receiver: "gpu-receiver"
      group_by: ["alertname", "instance", "gpu"]

    - match:
        component: model-serving
      receiver: "serving-receiver"
      group_by: ["alertname", "namespace", "engine_type"]

receivers:
  - name: default-receiver
    webhook_configs:
      - url: "http://alertmanager-webhook.monitoring:9093/alerts"
        send_resolved: true

  - name: critical-receiver
    pagerduty_configs:
      - service_key: "${PAGERDUTY_SERVICE_KEY}"
        severity: critical
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#ml-incidents"
        title: "[CRITICAL] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: warning-receiver
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#ml-ops"
        title: "[WARNING] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: gpu-receiver
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#gpu-ops"
        title: "[GPU] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

  - name: serving-receiver
    slack_configs:
      - api_url: "${SLACK_WEBHOOK_URL}"
        channel: "#ml-ops"
        title: "[SERVING] {{ .GroupLabels.alertname }}"
        text: "{{ range .Alerts }}{{ .Annotations.description }}{{ end }}"

inhibit_rules:
  - source_match:
      severity: critical
    target_match:
      severity: warning
    equal: ["alertname", "namespace"]