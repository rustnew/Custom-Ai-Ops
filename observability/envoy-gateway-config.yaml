apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: model-serving-route
  namespace: model-serving-prod
spec:
  parentRefs:
    - name: envoy-gateway
      namespace: envoy-gateway-system
      sectionName: https
  hostnames:
    - "inference.example.com"
  rules:
    - backendRefs:
        - name: model-serving-engine
          port: 80
          weight: 100
          filters:
            - type: RequestHeaderModifier
              requestHeaderModifier:
                add:
                  - x-upstream: primary
        - name: model-serving-fallback
          port: 443
          weight: 0
          group: ""
          kind: Service
      timeouts:
        request: "30s"
        backendRequest: "25s"
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: BackendTrafficPolicy
metadata:
  name: model-serving-health-check
  namespace: model-serving-prod
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: model-serving-route
  healthCheck:
    type: HTTP
    http:
      path: /health
      expectedResponses:
        - statusCode: 200
    interval: 10s
    timeout: 5s
    unhealthyThreshold: 3
    healthyThreshold: 2
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: BackendTrafficPolicy
metadata:
  name: model-serving-failover
  namespace: model-serving-prod
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: HTTPRoute
      name: model-serving-route
  circuitBreaker:
    strategy: Prioritized
    priorities:
      - priority: 0
        maxConnections: 100
        maxPendingRequests: 50
        maxRequests: 100
        maxRetries: 3
      - priority: 1
        maxConnections: 200
        maxPendingRequests: 100
        maxRequests: 200
        maxRetries: 3
  retry:
    codes:
      - 502
      - 503
      - 504
    attempts: 2
    backoff: 500ms
    perRetry:
      timeout: 5s
---
apiVersion: gateway.networking.k8s.io/v1beta1
kind: HealthCheckPolicy
metadata:
  name: model-serving-latency-failover
  namespace: model-serving-prod
spec:
  targetRefs:
    - group: ""
      kind: Service
      name: model-serving-engine
  default:
    active:
      type: HTTP
      http:
        path: /health
        expectedResponses:
          - statusCode: 200
      interval: 10s
      timeout: 2s
      unhealthyThreshold: 3
      healthyThreshold: 2
    passive:
      type: HTTP
      http:
        successCount: 5
        failureCount: 3
      timeout: 2000ms
    healthyThreshold: 2