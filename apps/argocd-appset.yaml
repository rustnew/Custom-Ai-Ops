# ArgoCD ApplicationSet for ML Model Serving Platform
# Manages deployment across multiple environments with sync waves

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ml-models
  namespace: argocd
spec:
  generators:
    - jackson:
        url: https://raw.githubusercontent.com/onnx-ai-helm/argocd-config/main/models.json
  template:
    metadata:
      name: {{name}}
      labels:
        app.kubernetes.io/name: ml-models
        app.kubernetes.io/part-of: onnx-ai-helm
    spec:
      project: {{project}}
      source:
        repoURL: https://github.com/onnx-ai-helm/charts.git
        targetRevision: main
        path: charts/model-serving-{{engine}}
      destination:
        server: https://kubernetes.default.svc
        namespace: {{namespace}}
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
          - PruneLast=true
        # Sync waves configuration
        # Wave -3: Bootstrap & Secrets
        # Wave -2: Storage (RWX PVC)
        # Wave -1: GPU Operator & Collectors
        # Wave 0: Model Server StatefulSet
        syncWaves:
          - name: bootstrap-secrets
            resources:
              - name: namespace
              - name: configmap
              - name: secret
          - name: storage
            resources:
              - name: pvc
          - name: gpu-collectors
            resources:
              - name: daemonset
              - name: deployment
          - name: model-server
            resources:
              - name: statefulset
              - name: ingress
        # Health check configuration
        healthChecks:
          - liveness:
              initialDelaySeconds: 120
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 30
          - readiness:
              initialDelaySeconds: 180
              periodSeconds: 10
              timeoutSeconds: 5
              failureThreshold: 30
