apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: model-serving-staging
  namespace: argocd
spec:
  generators:
    - git:
        repoURL: https://github.com/onnx-ai/onnx-ai-helm.git
        revision: HEAD
        directories:
          - path: environments/staging
  template:
    metadata:
      name: '{{path.basename}}-staging'
      annotations:
        argocd.argoproj.io/sync-wave: "0"
    spec:
      project: model-serving
      source:
        repoURL: https://github.com/onnx-ai/onnx-ai-helm.git
        targetRevision: HEAD
        path: charts/model-serving-engine
        helm:
          valueFiles:
            - values.yaml
            - ../../environments/staging/values.yaml
          parameters:
            - name: global.namespace
              value: model-serving-staging
      destination:
        server: https://kubernetes.default.svc
        namespace: model-serving-staging
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
          allowEmpty: false
        syncOptions:
          - CreateNamespace=true
          - ServerSideApply=true
        retry:
          limit: 5
          backoff:
            duration: 15s
            factor: 2
            maxDuration: 3m