# ArgoCD ApplicationSet for Development Environment
# Simplified sync waves for faster iteration

apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: ml-models-dev
  namespace: argocd
spec:
  generators:
    - json:
        files:
          - |
            [
              {
                "name": "llama-cpp-model",
                "engine": "llama-cpp",
                "namespace": "ml-serving-dev",
                "project": "default"
              }
            ]
  template:
    metadata:
      name: {{name}}
      labels:
        app.kubernetes.io/name: ml-models-dev
        app.kubernetes.io/part-of: onnx-ai-helm
        env: dev
    spec:
      project: default
      source:
        repoURL: https://github.com/onnx-ai-helm/charts.git
        targetRevision: main
        path: charts/model-serving-{{engine}}
      destination:
        server: https://kubernetes.dev.onnx-ai-helm.local
        namespace: {{namespace}}
      syncPolicy:
        automated:
          prune: false
          selfHeal: false
        syncOptions:
          - CreateNamespace=true
          - PrunePropagationPolicy=foreground
        # Simplified sync waves for dev
        syncWaves:
          - name: bootstrap
            resources:
              - name: namespace
              - name: secret
            executeFirst: true
          - name: model-server
            resources:
              - name: statefulset
              - name: ingress
