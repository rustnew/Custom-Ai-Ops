# ArgoCD Application for Development Environment
# Simplified sync waves for faster iteration

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-models-dev
  namespace: argocd
  labels:
    app.kubernetes.io/name: ml-models-dev
    app.kubernetes.io/part-of: onnx-ai-helm
    env: dev
spec:
  project: default
  source:
    repoURL: https://github.com/onnx-ai-helm/charts.git
    targetRevision: main
    path: charts
    kustomize:
      paths:
        - environments/dev/kustomization.yaml
  destination:
    server: https://kubernetes.dev.onnx-ai-helm.local
    namespace: ml-serving-dev
  syncPolicy:
    automated:
      prune: false
      selfHeal: false
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    # Simplified sync waves for dev
    syncWaves:
      - name: bootstrap
        resources:
          - name: namespace
          - name: secret-api-keys
        executeFirst: true
      - name: model-server
        resources:
          - name: statefulset-llama-cpp
          - name: ingress-gateway
      - name: observability
        resources:
          - name: deployment-grafana
          - name: deployment-prometheus
        executeLast: true
