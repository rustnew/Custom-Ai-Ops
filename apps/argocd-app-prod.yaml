# ArgoCD Application for Production Environment
# Sync waves: -3 Bootstrap, -2 Storage, -1 GPU Operators, 0 Model Server

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ml-models-prod
  namespace: argocd
  labels:
    app.kubernetes.io/name: ml-models-prod
    app.kubernetes.io/part-of: onnx-ai-helm
    env: prod
spec:
  project: default
  source:
    repoURL: https://github.com/onnx-ai-helm/charts.git
    targetRevision: main
    path: charts
    kustomize:
      paths:
        - environments/prod/kustomization.yaml
  destination:
    server: https://kubernetes.prod.onnx-ai-helm.local
    namespace: ml-serving-prod
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: true
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
      - PruneLast=true
    # Sync waves contract
    syncWaves:
      # Wave -3: Bootstrap & Secrets
      - name: bootstrap-secrets
        resources:
          - name: namespace
          - name: configmap-base
          - name: secret-api-keys
          - name: secret-database
        # Execute first to ensure namespace and secrets exist
        executeFirst: true
      
      # Wave -2: Storage (RWX PVC via Longhorn)
      - name: storage
        resources:
          - name: pvc-model-storage
          - name: pvc-model-cache
        # Create after namespace and secrets
      
      # Wave -1: NVIDIA GPU Operator & Prometheus Collectors
      - name: gpu-collectors
        resources:
          - name: gpu-operator
          - name: prometheus-operator
          - name: grafana-alloy
          - name: dcgm-exporter
        # Must run before model server to ensure GPU metrics available
      
      # Wave 0: Model Server StatefulSet workload
      - name: model-server
        resources:
          - name: statefulset-llama-cpp
          - name: statefulset-vllm
          - name: statefulset-onnx-rust
          - name: statefulset-triton
          - name: ingress-gateway
        # Runs after GPU collectors to ensure GPU resources available
      
      # Wave 1: Observability dashboards
      - name: observability
        resources:
          - name: deployment-grafana
          - name: deployment-prometheus
          - name: serviceaccount-monitoring
        # Depends on model server to collect metrics
      
      # Wave 2: Post-sync validation
      - name: post-sync-validation
        resources:
          - name: job-smoke-test
          - name: cronjob-load-test
        # Runs after all deployments complete
        executeLast: true
